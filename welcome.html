<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to rofiqsyf</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* Tema Gelap khas GitHub */
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(88, 166, 255, 0.2);
        }
        .typewriter h1 {
            font-size: 2.5rem;
            color: #58a6ff;
            overflow: hidden;
            border-right: .15em solid #58a6ff;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .10em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #58a6ff; }
        }
        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.1rem;
            color: #fff;
            background: linear-gradient(90deg, #238636, #2ea043);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background: linear-gradient(90deg, #2ea043, #3fb950);
            box-shadow: 0 0 20px rgba(46, 160, 67, 0.6);
            transform: scale(1.05);
        }
        #hidden-msg {
            opacity: 0;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ff7b72;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="typewriter">
            <h1>Hai, Saya @rofiqsyf 👋</h1>
        </div>
        <p>Selamat datang di ruang kreatif saya.</p>
        <button class="btn" onclick="revealMagic()">Mulai Eksplorasi</button>
        <p id="hidden-msg">✨ Mari ciptakan sesuatu yang luar biasa bersama! ✨</p>
    </div>

    <script>
        function revealMagic() {
            // Memunculkan pesan rahasia
            const msg = document.getElementById('hidden-msg');
            msg.style.opacity = '1';
            
            // Membuat efek partikel sederhana
            for (let i = 0; i < 40; i++) {
                let particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = '8px';
                particle.style.height = '8px';
                particle.style.background = i % 2 === 0 ? '#58a6ff' : '#2ea043';
                particle.style.borderRadius = '50%';
                particle.style.left = (window.innerWidth / 2) + 'px';
                particle.style.top = (window.innerHeight / 2) + 'px';
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 100 + Math.random() * 100;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity;
                
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2000);
            }
        }
    </script>
</body>
</html>
